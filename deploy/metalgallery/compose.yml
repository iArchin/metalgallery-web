# /opt/metalgallery/compose.yml
#
# The storefront + admin panel. The edge is the Nginx Proxy Manager container
# that already runs on this server and owns 80/443; it reaches this container by
# name (mg-web:3000) over a network dedicated to this project. Nothing here is
# published to the host.
#
# `mg_edge` exists so metalgallery and the unrelated `inky` project cannot reach
# each other. Joining npm's own `npm_default` would put mg-web on one bridge with
# inky-web and inky-api — same proxy, but also a direct route between two
# projects that share nothing. Instead npm is attached to both networks and is
# the only container on either side of the boundary:
#
#     npm ──┬── npm_default  ── inky-web, inky-api ── inky_inky-internal ── inky-db
#           └── mg_edge      ── mg-web ── mg-db ── mg_pgdata
#
# Create it once, and attach the proxy to it:
#     docker network create mg_edge
#     docker network connect mg_edge npm     # no restart; npm keeps serving
#
# Caveat worth knowing: `docker network connect` is a runtime attachment. If npm
# is ever recreated (a `docker compose up -d` in /opt/npm), it rejoins only the
# networks in its own compose file and metalgallery starts 502ing. The durable
# fix is to declare mg_edge as an external network in /opt/npm/docker-compose.yml.
#
# The image is built on the server (`docker build -t metalgallery-web:latest .`
# in the source dir) because this box can reach Docker Hub and npm, has 5.9 GB
# of RAM, and the build no longer needs Google Fonts — Vazirmatn is vendored.
# There is no `build:` block so that `docker compose up` never rebuilds by
# accident; a rebuild is always an explicit `docker build`.
#
# Two facts drive this file and are not negotiable:
#
#   1. NEXT_PUBLIC_SITE_URL is inlined into the browser bundle at BUILD time.
#      Setting it here does nothing for the client. It is baked by deploy.sh.
#   2. The db service must never read the whole .env. See the comment on its
#      `environment:` block — env_file there recreates Postgres on every deploy.
#
# The fixed container_name on web is kept because NPM resolves the upstream by
# that name, and because it makes Compose unable to run two web containers at
# once. It is no longer a *correctness* requirement: the single-writer JSON
# database is gone, and Postgres serializes writes itself.

name: metalgallery

services:
  web:
    # Set MG_IMAGE in .env to pull a published build instead of a locally-built
    # one, e.g. MG_IMAGE=ghcr.io/iarchin/metalgallery-web:latest. CI pins the
    # commit SHA rather than :latest so a rollback is `MG_IMAGE=…:<sha>`.
    image: ${MG_IMAGE:-metalgallery-web:latest}
    container_name: mg-web

    # The VPS is amd64. Pin it so an image built on an arm64 laptop and loaded
    # here fails fast at `docker load` rather than at exec time.
    platform: linux/amd64

    restart: unless-stopped

    # SESSION_SECRET, ADMIN_HOST, SMS_IR_*, NODE_ENV, DATA_DIR, TZ.
    # Compose auto-loads `.env` from this directory, so plain `docker compose
    # ps|logs|down` work without --env-file.
    env_file:
      - .env

    # Set only by ops/restore.sh, for the single boot that follows a restore:
    #   MG_SKIP_IMPORT=1 docker compose up -d --wait web
    # Unset otherwise, so an ordinary deploy never carries it.
    environment:
      MG_SKIP_IMPORT: ${MG_SKIP_IMPORT:-}

    # No `ports:`. Publishing 3000 would expose an unencrypted Next server to
    # the internet — Docker writes its NAT rules ahead of UFW, so `ufw default
    # deny incoming` would not stop it — and would bypass the proxy's forwarded
    # headers, breaking both the admin host routing and the OTP rate limiter.
    # `expose` is documentation; the port is reachable only on the proxy network.
    expose:
      - "3000"
    networks:
      - edge

    # mg_data still carries the legacy JSON. It is mounted so the first boot on
    # Postgres can IMPORT it (import-json.ts) during cutover; after that it is
    # dormant. Safe to drop from this list once the data lives in Postgres.
    volumes:
      - mg_data:/app/data

    # Only start once Postgres is accepting connections — the boot migrator
    # needs it. `--wait` then gates on the app's own healthcheck.
    depends_on:
      db:
        condition: service_healthy

    # Standalone Next idles around 80–150 MB; 512m leaves room for render
    # spikes on a 1–2 GB VPS. These two keys are honored by plain
    # `docker compose up` (the `deploy.resources` block is swarm-only).
    mem_limit: 512m
    cpus: 1.0

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Gate for `docker compose up -d --wait`. /api/health touches no collection,
    # so it answers immediately. node:22 ships fetch().
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Postgres, private to this project -------------------------------------
  # Only on mg_edge (never npm_default), so it is unreachable from inky and from
  # the host — no published ports. The app connects as mg-db:5432.
  db:
    image: postgres:17-alpine
    container_name: mg-db
    restart: unless-stopped
    # Only the keys Postgres actually consumes, interpolated from .env at parse
    # time. Do NOT use `env_file: [.env]` here. That injects EVERY line of .env
    # into this container — including MG_IMAGE, which ci-deploy.sh rewrites on
    # every deploy. Compose folds a service's resolved environment into its
    # config hash, so mg-db would be recreated on every push: the database
    # bounced for a change that has nothing to do with it. These four keys are
    # stable across deploys, so mg-db is left alone when only MG_IMAGE moves.
    #
    # Interpolation still works without env_file — it is the same mechanism that
    # resolves `image: ${MG_IMAGE:-…}` above. TZ is listed because env_file used
    # to supply it, and dropping it would quietly move this container's log
    # timestamps to UTC. DATABASE_URL, SESSION_SECRET and SMS_IR_* are
    # deliberately gone: Postgres never read them, and app secrets have no
    # business sitting in the database container's environment.
    #
    # POSTGRES_PASSWORD is read by initdb on the FIRST boot only. Once the
    # cluster exists the credential lives in pg_authid and editing it here
    # changes nothing. Rotate with `ALTER USER … PASSWORD`, then DATABASE_URL.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      TZ: ${TZ:-Asia/Tehran}
    volumes:
      - mg_pgdata:/var/lib/postgresql/data
    networks:
      - edge
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# mg_data = legacy JSON (kept for the cutover import). mg_pgdata = the Postgres
# data directory, the durable artifact from here on. Back THIS up.
volumes:
  mg_data:
    name: mg_data
  mg_pgdata:
    name: mg_pgdata

# Dedicated to this project; the proxy is attached to it separately. NPM resolves
# `mg-web` by container name only because both sit on this network.
# `external: true` means this stack never creates or deletes it — so a
# `docker compose down` here can never take a network out from under npm.
networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-mg_edge}
